name: Deploy to Digital Ocean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./sukaalicheck
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sukaalicheck:latest
          build-args: |
            NEXT_PUBLIC_API_BASE=${{ secrets.NEXT_PUBLIC_API_BASE }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./sukaali-check-backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sukaalicheck-backend:latest

      - name: Deploy to droplet via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/sukaalicheck
            docker-compose pull frontend backend
            docker-compose up -d frontend backend
            docker image prune -f
